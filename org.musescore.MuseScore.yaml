---
id: org.musescore.MuseScore
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk

command: mscore
rename-icon: mscore
copy-icon: true
rename-mime-file: musescore.xml
rename-mime-icons:
  - application-x-musescore
  - application-x-musescore+xml

finish-args:
  - --share=ipc
  - --socket=x11
  # MuseScore.com connectivity
  - --share=network
  - --socket=pulseaudio
  - --socket=cups
  - --device=dri
  # Allow loading/saving files from anywhere
  # (portals don’t work yet)
  - --filesystem=home
  # Allow other instances to see lockfiles
  - --env=TMPDIR=/var/tmp
  - --filesystem=xdg-run/pipewire-0
  - --system-talk-name=org.freedesktop.UPower

add-extensions:
  org.freedesktop.LinuxAudio.Plugins:
    directory: extensions/Plugins
    version: '24.08'
    add-ld-path: lib
    merge-dirs: vst3
    subdirectories: true
    no-autodownload: true

cleanup:
  - /share/man

modules:
  - name: musescore
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DMUSE_APP_BUILD_MODE=release
      - -DMUSE_ENABLE_UNIT_TESTS=OFF
      - -DMUSE_MODULE_VST=ON
      - -DMUSE_MODULE_VST_VST3_SDK_PATH=../vst3sdk
      - -DMUSE_MODULE_NETWORK_WEBSOCKET=ON
      # See: https://github.com/musescore/MuseScore/commit/696279e362afe72db5e92f8a47aa64b3a0e86a86
      - -DMUE_COMPILE_USE_SYSTEM_HARFBUZZ=ON
    cleanup:
      - /include
      - /lib/cmake
      - /lib/pkgconfig
      - '*.a'
    post-install:
      - install -d /app/extensions/Plugins
      # https://github.com/hughsie/appstream-glib/blob/master/libappstream-glib/as-app-builder.c#L374
      - install -d /app/share/mscore
      - ln -s /app/share/mscore-4.6/locale /app/share/mscore/translations
    sources:
      - type: git
        url: https://github.com/steinbergmedia/vst3sdk.git
        tag: v3.8.0_build_66
        commit: 9fad9770f2ae8542ab1a548a68c1ad1ac690abe0
        dest: vst3sdk
        x-checker-data:
          type: git
          tag-pattern: ^v(\d+.\d+.\d+_build_\d+)$
      - type: patch
        path: patches/vst3sdk_paths.patch
        options:
          - --directory=vst3sdk
      - type: archive
        url: https://github.com/musescore/MuseScore/archive/refs/tags/v4.6.3.tar.gz
        sha256: 507f4e8566b693fe27b08ea3e5861a0fe1cecf3bbc72cbac13657bd4f49234d5
        x-checker-data:
          is-main-source: true
          type: json
          url: https://api.github.com/repos/musescore/MuseScore/releases/latest
          version-query: .tag_name
          url-query: |
            "https://github.com/musescore/MuseScore/archive/refs/tags/" + $version + ".tar.gz"
          timestamp-query: .published_at
      - type: patch
        path: patches/musescore-fixes.patch
